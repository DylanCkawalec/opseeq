version: 1
name: nemoclaw-superior-default
mode: deny_and_ask
whitepaper_law:
  local_first: true
  artifact_immutable: true
  human_invariant_layer: true
  out_of_trust_never_authoritative: true
  probabilistic_outputs_not_truth: true
  explicit_permission_required: true
  rollback_required: true

filesystem:
  require_absolute_paths: true
  default_roots:
    - /Users/dylanckawalec/Desktop/developer
  deny_patterns:
    - "/System/**"
    - "/Library/**"
    - "/private/var/db/**"
    - "~/.ssh/**"
    - "~/.gnupg/**"
    - "~/.aws/**"
  destructive_requires_confirmation: true
  destructive_ops:
    - rm
    - mv
    - chmod
    - chown
    - diskutil
    - dd
    - mkfs
    - hdiutil
    - find -delete
    - git clean
    - git reset --hard

network:
  default_mode: local_only
  allowed_local:
    - http://127.0.0.1:*
    - http://localhost:*
    - http://host.docker.internal:*
  allowed_remote_if_explicitly_approved:
    - https://api.anthropic.com/*
  deny_by_default: true

process:
  require_shell_wrapper: true
  blocked_commands:
    - launchctl bootout system
    - csrutil
    - nvram
    - kextload
    - spctl --master-disable
    - sqlite3 ~/Library/Safari
  allowlisted_admin_commands: []

observability:
  event_log_jsonl: ~/.opseeq-superior/logs/events.jsonl
  command_log_jsonl: ~/.opseeq-superior/logs/commands.jsonl
  trace_sink: ~/.opseeq-superior/traces
  hash_prompts: true
  redact_env_keys:
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY
    - AWS_SECRET_ACCESS_KEY
    - GH_TOKEN

malware_detection:
  enabled: true
  heuristics:
    - persistence_installation
    - shell_history_tampering
    - credential_harvest_pattern
    - unauthorized_remote_egress
    - destructive_bulk_delete
    - quarantine_bypass
    - hidden_launch_agent_creation
  action_on_hit: freeze_and_require_human_review

models:
  supervisor_default: kimi-2.5-local
  allow_ollama_override: true
  anthropic_out_of_trust: true

artifacts:
  require_plan_hash: true
  require_policy_hash: true
  require_execution_manifest: true
  require_rollback_manifest: true
