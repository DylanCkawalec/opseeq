services:
  postgres:
    image: postgres:16-alpine
    container_name: opseeq-copilot-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: copilot
    ports:
      - "5433:5432"
    volumes:
      - copilot-pgdata:/var/lib/postgresql/data
volumes:
  copilot-pgdata: {}
