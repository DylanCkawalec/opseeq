# Opseeq AI Agent Gateway — Docker Compose
#
# Usage:
#   docker compose up -d          # Start the service
#   docker compose logs -f        # Watch logs
#   docker compose down           # Stop
#
# The service exposes:
#   - http://localhost:9090/v1/chat/completions  (OpenAI-compatible)
#   - http://localhost:9090/v1/models            (model listing)
#   - http://localhost:9090/v1/embeddings        (embedding passthrough)
#   - http://localhost:9090/mcp                  (MCP SSE for agentic tools)
#   - http://localhost:9090/health               (health check)

networks:
  opseeq-net:
    driver: bridge

services:
  opseeq:
    build:
      context: .
      dockerfile: Dockerfile.service
      tags:
        - opseeq:v6.0
    image: opseeq:v6.0
    container_name: opseeq
    init: true
    stop_grace_period: 10s
    ports:
      - "${OPSEEQ_PORT:-9090}:9090"
    env_file:
      - .env
    environment:
      - OPSEEQ_HOST=0.0.0.0
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - opseeq-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Optional: Local NIM instance (requires NVIDIA GPU)
  # Uncomment to run NVIDIA NIM locally alongside the gateway
  #
  # nim:
  #   image: nvcr.io/nim/meta/llama-3.3-70b-instruct:latest
  #   container_name: opseeq-nim
  #   runtime: nvidia
  #   environment:
  #     - NGC_API_KEY=${NVIDIA_API_KEY}
  #   ports:
  #     - "8000:8000"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/ready"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 120s

  # Mermate — Mermaid-GPT Architecture Pipeline (diagram generation)
  mermate:
    image: mermate:v5
    container_name: mermate
    ports:
      - "3333:3333"
    env_file:
      - ../mermaid/.env
    environment:
      - OPSEEQ_URL=http://opseeq:9090
    restart: unless-stopped
    networks:
      - opseeq-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3333/api/copilot/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      opseeq:
        condition: service_healthy

  # Synth — AI Prediction Market Desk
  synth:
    image: synth:v5
    container_name: synth
    ports:
      - "8420:8420"
    env_file:
      - ../synthesis-trade/.env
    environment:
      - OPSEEQ_URL=http://opseeq:9090
    restart: unless-stopped
    networks:
      - opseeq-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8420/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      opseeq:
        condition: service_healthy

  # Lucidity — Postgres for context/persistence
  lucidity-postgres:
    image: postgres:16-alpine
    container_name: lucidity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lucidity
      POSTGRES_PASSWORD: lucidity
      POSTGRES_DB: lucidity
    ports:
      - "5433:5432"
    volumes:
      - lucidity-postgres:/var/lib/postgresql/data
    networks:
      - opseeq-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lucidity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  lucidity-postgres:
