# Opseeq AI Agent Gateway — Docker Compose
#
# Usage:
#   docker compose up -d          # Start the service
#   docker compose logs -f        # Watch logs
#   docker compose down           # Stop
#
# The service exposes:
#   - http://localhost:9090/v1/chat/completions  (OpenAI-compatible)
#   - http://localhost:9090/v1/models            (model listing)
#   - http://localhost:9090/v1/embeddings        (embedding passthrough)
#   - http://localhost:9090/mcp                  (MCP SSE for agentic tools)
#   - http://localhost:9090/health               (health check)

networks:
  opseeq-net:
    driver: bridge

services:
  opseeq:
    build:
      context: .
      dockerfile: Dockerfile.service
      tags:
        - opseeq:v5
    image: opseeq:v5
    container_name: opseeq
    init: true
    stop_grace_period: 10s
    ports:
      - "${OPSEEQ_PORT:-9090}:9090"
    env_file:
      - .env
    environment:
      - OPSEEQ_HOST=0.0.0.0
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - opseeq-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

